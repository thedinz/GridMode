name: Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Stamp CI version
        shell: pwsh
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.GRIDMODE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:win

  mac:
    name: Build and publish Mac installer
    runs-on: macos-15-intel
    needs: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Stamp CI version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.GRIDMODE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Mac signing setup
        id: mac-signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [[ -n "${CSC_LINK}" && -n "${CSC_KEY_PASSWORD}" ]]; then
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::Mac signing secrets are not configured, so this run will build an unsigned DMG/ZIP artifact but will not publish Mac auto-update assets."
            echo "publish=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and publish signed Mac release
        if: steps.mac-signing.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm release:mac

      - name: Build unsigned Mac artifact
        if: steps.mac-signing.outputs.publish != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm dist:mac

      - name: Upload unsigned Mac artifact
        if: steps.mac-signing.outputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GridMode-mac-unsigned
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error
