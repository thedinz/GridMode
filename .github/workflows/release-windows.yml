name: Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp CI version
        shell: pwsh
        run: pnpm stamp-version $env:GRIDMODE_VERSION
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm release:win

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}
        run: |
          $tag = "v$env:GRIDMODE_VERSION"
          gh release view $tag --repo thedinz/GridMode
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "GridMode $env:GRIDMODE_VERSION" --notes "GridMode $env:GRIDMODE_VERSION" --repo thedinz/GridMode --draft
          }

      - name: Upload Windows installer and signature
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}
        run: |
          $tag = "v$env:GRIDMODE_VERSION"
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer was produced."
          }
          $signature = Get-Item "$($installer.FullName).sig"
          gh release upload $tag $installer.FullName $signature.FullName --clobber --repo thedinz/GridMode

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridMode-windows-tauri
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  mac:
    name: Build and publish Mac download
    runs-on: macos-15-intel
    needs: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp CI version
        run: pnpm stamp-version "$GRIDMODE_VERSION"
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Build unsigned Mac download
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm dist:mac

      - name: Upload Mac DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}
        run: gh release upload "v${GRIDMODE_VERSION}" src-tauri/target/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/macos/*.app.tar.gz src-tauri/target/release/bundle/macos/*.app.tar.gz.sig --clobber --repo thedinz/GridMode

      - name: Download Windows updater artifact
        uses: actions/download-artifact@v4
        with:
          name: GridMode-windows-tauri
          path: release-artifacts/windows

      - name: Upload Tauri updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}
        run: |
          node scripts/create-tauri-updater-json.mjs "$GRIDMODE_VERSION" "$PWD/latest.json" "$PWD/release-artifacts/windows" "$PWD/src-tauri/target/release/bundle/macos"
          gh release upload "v${GRIDMODE_VERSION}" "$PWD/latest.json" --clobber --repo thedinz/GridMode
          gh release edit "v${GRIDMODE_VERSION}" --draft=false --latest --repo thedinz/GridMode

      - name: Upload Mac workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridMode-mac-unsigned
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest.json
          if-no-files-found: error
