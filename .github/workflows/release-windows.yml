name: Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Stamp CI version
        shell: pwsh
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.GRIDMODE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:win

  mac:
    name: Build and publish Mac download
    runs-on: macos-15-intel
    needs: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Stamp CI version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.GRIDMODE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
        env:
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned Mac download
        run: pnpm dist:mac

      - name: Upload Mac DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIDMODE_VERSION: 0.1.${{ github.run_number }}
        run: gh release upload "v${GRIDMODE_VERSION}" release/*.dmg --clobber --repo thedinz/GridMode

      - name: Upload Mac workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridMode-mac-unsigned
          path: |
            release/*.dmg
          if-no-files-found: error
